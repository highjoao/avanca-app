<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Avança — Controle seu dinheiro. Organize sua rotina. Avance na vida.</title>
<meta name="description" content="Avança: o app premium de finanças pessoais para autônomos, vendedores e microempreendedores. Controle cartões, cobranças, metas e planejamento."/>
<meta name="theme-color" content="#0b1017"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- Loading Screen -->
<div id="app-loading" class="hidden">
  <div class="loading-logo">Avança</div>
  <div class="loading-spinner"></div>
</div>

<!-- Auth Container (Login / Signup) -->
<div id="auth-container" class="hidden"></div>

<!-- Header -->
<header id="app-header" class="hidden">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-avatar" id="header-avatar">A</div>
      <h1 class="header-brand">Avança</h1>
    </div>
    <button class="header-btn" id="btn-notifications" aria-label="Notificações">
      <span class="material-symbols-outlined">notifications</span>
      <span class="notif-badge" id="notif-badge">3</span>
    </button>
  </div>
</header>

<!-- Main Content Area -->
<main id="app-main" class="hidden">
  <div id="view-container"></div>
</main>

<!-- FAB -->
<button class="fab hidden" id="fab-main" aria-label="Ação rápida">
  <span class="material-symbols-outlined">add</span>
</button>

<!-- FAB Menu Overlay -->
<div class="fab-overlay hidden" id="fab-overlay">
  <div class="fab-menu" id="fab-menu">
    <button class="fab-option" data-action="new-expense"><span class="material-symbols-outlined">shopping_cart</span><span>Novo gasto</span></button>
    <button class="fab-option" data-action="new-income"><span class="material-symbols-outlined">account_balance_wallet</span><span>Novo ganho</span></button>
    <button class="fab-option" data-action="new-card"><span class="material-symbols-outlined">credit_card</span><span>Novo cartão</span></button>
    <button class="fab-option" data-action="new-receivable"><span class="material-symbols-outlined">person_add</span><span>Nova cobrança</span></button>
    <button class="fab-option" data-action="new-goal"><span class="material-symbols-outlined">flag</span><span>Nova meta</span></button>
    <button class="fab-option" data-action="new-task"><span class="material-symbols-outlined">task_alt</span><span>Nova tarefa</span></button>
    <button class="fab-option" data-action="new-project"><span class="material-symbols-outlined">rocket_launch</span><span>Novo projeto</span></button>
  </div>
</div>

<!-- Bottom Nav -->
<nav id="bottom-nav" class="hidden">
  <button class="nav-item active" data-view="dashboard">
    <span class="material-symbols-outlined" data-filled="true">home</span>
    <span class="nav-label">Início</span>
  </button>
  <button class="nav-item" data-view="expenses">
    <span class="material-symbols-outlined">shopping_cart</span>
    <span class="nav-label">Gastos</span>
  </button>
  <button class="nav-item" data-view="cards">
    <span class="material-symbols-outlined">credit_card</span>
    <span class="nav-label">Cartões</span>
  </button>
  <button class="nav-item" data-view="receivables">
    <span class="material-symbols-outlined">groups</span>
    <span class="nav-label">A Receber</span>
  </button>
  <button class="nav-item" data-view="more">
    <span class="material-symbols-outlined">menu</span>
    <span class="nav-label">Mais</span>
  </button>
</nav>

<!-- Modal Container -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<!-- More Menu Sheet -->
<div class="modal-overlay hidden" id="more-overlay">
  <div class="modal-sheet more-sheet" id="more-sheet">
    <div class="modal-handle"></div>
    <div class="more-menu-content">
      <h3 class="more-title">Mais opções</h3>
      <button class="more-item" data-view="income"><span class="material-symbols-outlined">trending_up</span><span>Ganhos</span></button>
      <button class="more-item" data-view="goals"><span class="material-symbols-outlined">flag</span><span>Metas</span></button>
      <button class="more-item" data-view="planning"><span class="material-symbols-outlined">calendar_month</span><span>Planejamento</span></button>
      <button class="more-item" data-view="profile"><span class="material-symbols-outlined">settings</span><span>Configurações</span></button>
    </div>
  </div>
</div>

<!-- Onboarding -->
<div class="onboarding-overlay hidden" id="onboarding-overlay">
  <div class="onboarding-container" id="onboarding-container"></div>
</div>

<!-- Scripts: order matters -->
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/expenses.js"></script>
<script src="js/views/income.js"></script>
<script src="js/views/cards.js"></script>
<script src="js/views/receivables.js"></script>
<script src="js/views/goals.js"></script>
<script src="js/views/planning.js"></script>
<script src="js/views/profile.js"></script>
<script src="js/app.js"></script>
</body>
</html>
